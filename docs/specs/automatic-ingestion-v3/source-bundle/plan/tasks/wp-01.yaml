schema_version: 1
id: WP-01
phase: 0
title: Schema, contract, and validation toolchain
description: Implement the machine-readable contracts and validators used by every later work package.
goals:
- Reject malformed artifacts before durable mutation
- Keep contracts portable across providers and runtime choices
dependencies:
- WP-00
exit_gate:
- All WP-01 tasks satisfy acceptance criteria and required tests pass.
- Artifacts are reviewed and versioned; unresolved high/critical risks are recorded.
tasks:
