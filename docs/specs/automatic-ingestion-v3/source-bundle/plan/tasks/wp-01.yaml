  estimate_class: M
  risk_level: high
  status: planned
  notes: []
- schema_version: 1
  id: T-01-02
  work_package_id: WP-01
  title: Implement agent and workflow manifest validation
  description: Validate tool allowlists, output schemas, fresh-context flags, state transitions, and referenced agents/subworkflows.
  goals:
  - Validate tool allowlists, output schemas, fresh-context flags, state transitions, and referenced agents/subworkflows.
