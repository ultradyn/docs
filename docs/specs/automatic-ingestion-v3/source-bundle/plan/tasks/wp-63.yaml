  work_package_id: WP-63
  title: Implement publication planner and worktree writer
  description: Select artifacts, paths, maps, fixtures, and authority mode; write isolated branch.
  goals:
  - Select artifacts, paths, maps, fixtures, and authority mode; write isolated branch.
  dependencies:
  - T-42-03
  - T-60-03
  - T-61-03
  - T-62-03
  deliverables:
  - Publication service
  - Worktree adapter
