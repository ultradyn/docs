  - integration
  - security
  - recovery
  owner_role: Git integration engineer
  estimate_class: L
  risk_level: critical
  status: planned
  notes: []
- schema_version: 1
  id: T-63-02
  work_package_id: WP-63
  title: Implement independent diff review and summary
  description: Review final diff against plan/claims and summarize final diff alone.
  goals:
  - Review final diff against plan/claims and summarize final diff alone.
  dependencies:
  - T-63-01
  deliverables:
  - Diff reviewer/summarizer
  - PR checks
  acceptance_criteria:
  - Summary cannot use integration-agent context
  - Missed canonical-home or unsupported changes block
