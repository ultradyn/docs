schema_version: 1
id: agent-authority-resolver
version: 1
role_category: adjudicator
fresh_context: true
purpose: Resolve clear authority/lifecycle cases or route ambiguity to a named human owner.
inputs:
- Claims
- Sources
- Project authority policy
allowed_tools:
- source.search_authority
- source.search_deprecation
- source.open_reference
