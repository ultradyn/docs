schema_version: 1
id: agent-final-auditor
version: 1
role_category: auditor
fresh_context: true
purpose: Evaluate all operational closure and publication gates.
inputs:
- Run records
- Coverage
- Claims
- Answers
- Documents
- Policies
allowed_tools:
- graph.audit
- coverage.audit
- source.verify_replay
- tests.read_results
