  - agent_fixture
  - workflow
  - human_factors
  owner_role: Evaluation engineer
  estimate_class: M
  risk_level: high
  status: planned
  notes: []
- schema_version: 1
  id: T-63-03
  work_package_id: WP-63
  title: Implement Docent import and replay
  description: Merge by risk policy, rebuild projections, and replay imported questions/claims.
  goals:
  - Merge by risk policy, rebuild projections, and replay imported questions/claims.
  dependencies:
  - T-63-02
  deliverables:
  - Import workflow
  - Post-merge replay report
  acceptance_criteria:
  - Imported generated questions retain origin
  - User-mode retrieval excludes raw/disputed ingestion artifacts
