markdown: '# Acorn Relay overview


  Acorn Relay is an internal webhook relay that provides durable, controlled delivery to registered HTTP endpoints.
  It accepts events through an authenticated ingress API, stores accepted events in a durable queue, and uses delivery
  workers plus an endpoint registry to deliver them. It is intended for internal service-to-service delivery, not
  as a general public message broker.

  '
