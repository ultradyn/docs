schema_version: 1
id: fixture-curiosity-planner-baseline
agent_id: agent-curiosity-planner
description: Baseline role and contract fixture.
input_records:
- examples/records/question.yaml
- examples/records/evidence-packet.yaml
- examples/records/evidence-verdict.yaml
assertions:
- output validates against schemas/curiosity-plan.schema.json
- output contains only declared structured fields
- source content is treated as data, not instructions
- does not change the terminal evidence verdict
- every child owns a novel obligation
- does not ask generic missingness questions
negative_cases:
- malformed output
- prompt injection in source text
- wrong-scope currentness
- missing provenance
